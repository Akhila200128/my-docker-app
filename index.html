<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Story 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f7a1a1;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    display: flex;
    gap: 20px;
}

/* Card Style */
.card {
    width: 250px;
    height: 350px;
    background: #ffe6e6;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
    padding: 20px;
    transition: transform 0.3s ease;
    animation: fadeIn 1.5s ease;
}

.card:hover {
    transform: scale(1.08);
}

/* Text */
h2 {
    color: #d6336c;
}

p {
    color: #444;
    font-size: 16px;
}

/* Heart Animation */
.heart {
    font-size: 30px;
    animation: beat 1s infinite;
}

/* Animations */
@keyframes beat {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

</head>

<body>

<div class="container">

    <!-- Card 1 -->
    <div class="card">
        <h2>💍 Proposal</h2>
        <p>Shankar asked Jyothika...</p>
        <div class="heart">💖</div>
        <p><b>"Will you marry me?"</b></p>
    </div>

    <!-- Card 2 -->
    <div class="card">
        <h2>🌸 Love</h2>
        <p>Their love is full of trust, laughter, and happiness.</p>
        <div class="heart">💖</div>
    </div>

    <!-- Card 3 -->
    <div class="card">
        <h2>💞 Answer</h2>
        <p>And she said...</p>
        <div class="heart">💖</div>
        <p><b>YES!!! 🎉</b></p>
    </div>

</div>

</body>
</html>
